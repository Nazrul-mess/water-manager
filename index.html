<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Maintenance</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 600px;
            padding: 20px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        p {
            color: #cbd5e1;
            line-height: 1.6;
        }

        .status {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: #f59e0b;
            color: #000;
            border-radius: 999px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚧 Under Maintenance</h1>

        <p>
            We are currently performing scheduled maintenance and improvements.
            Please check back soon.
        </p>

        <div class="status">
            Expected return: 22 June 2026, 11:59 pm
        </div>
    </div>
</body>
</html>
