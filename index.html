<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nazrul Mess Water Management</title>
    <meta name="theme-color" content="#0a0f2a">
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="manifest" href="manifest.json">

    <!-- iOS "Add to Home Screen" support (iOS ignores manifest.json) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Nazrul Mess">
    <link rel="apple-touch-icon" href="logo.png">
<style>
  :root{
    --navy:#0b1f4d;
    --blue:#1e6fd9;
    --gold:#d4af6a;
    --paper:#eef4fb;
    --bg1:#0a0f2a;
    --bg2:#122452;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;height:100%;
    background:radial-gradient(ellipse at 50% 30%, var(--bg2) 0%, var(--bg1) 70%);
    overflow:hidden;
    font-family: 'Segoe UI', system-ui, sans-serif;
  }
  .stage{
    position:relative;
    width:100%;height:100vh;
    display:flex;align-items:center;justify-content:center;
  }
  .stars{position:absolute;inset:0;}
  .star{
    position:absolute;
    width:3px;height:3px;
    background:#fff;
    border-radius:50%;
    opacity:0;
    animation:twinkle 3s ease-in-out infinite;
  }
  @keyframes twinkle{
    0%,100%{opacity:0; transform:scale(0.5);}
    50%{opacity:1; transform:scale(1.3);}
  }
  .glow-ring{
    position:absolute;
    border-radius:50%;
    border:1px solid rgba(212,175,106,0.35);
    animation:spin 18s linear infinite, fadeInRing 1.5s ease-out both;
  }
  .glow-ring.r2{
    border-color:rgba(30,111,217,0.3);
    animation:spinRev 26s linear infinite, fadeInRing 1.5s ease-out both;
  }
  @keyframes spin{ from{transform:rotate(0deg);} to{transform:rotate(360deg);} }
  @keyframes spinRev{ from{transform:rotate(360deg);} to{transform:rotate(0deg);} }
  @keyframes fadeInRing{ from{opacity:0; transform:scale(0.6) rotate(0deg);} to{opacity:1;} }
  .aura{
    position:absolute;
    width:340px;height:340px;
    border-radius:50%;
    background:radial-gradient(circle, rgba(106, 195, 250, 0.656) 0%, rgba(30,111,217,0.18) 40%, transparent 70%);
    filter:blur(6px);
    animation:pulse 3.2s ease-in-out infinite, fadeIn 1s ease-out both;
  }
  @keyframes pulse{
    0%,100%{ transform:scale(1); opacity:0.7; }
    50%{ transform:scale(1.15); opacity:1; }
  }
  @keyframes fadeIn{ from{opacity:0;} to{opacity:1;} }
  .logo-wrap{
    position:relative;
    width:450px;height:450px;
    animation:entrance 1.4s cubic-bezier(.2,1.4,.4,1) both, float 4s ease-in-out 1.4s infinite;
    filter:drop-shadow(0 10px 25px rgba(0,0,0,0.55));
  }
  @keyframes entrance{
    0%{ opacity:0; transform:scale(0.2) rotate(-25deg); }
    60%{ opacity:1; transform:scale(1.08) rotate(4deg); }
    80%{ transform:scale(0.97) rotate(-2deg); }
    100%{ transform:scale(1) rotate(0deg); }
  }
  @keyframes float{
    0%,100%{ transform:translateY(0px); }
    50%{ transform:translateY(-14px); }
  }
  .logo-wrap img{
    width:100%;height:100%;
    border-radius:50%;
    display:block;
    object-fit:contain;
  }
  .shine{
    position:absolute;
    inset:0;
    overflow:hidden;
    border-radius:50%;
    pointer-events:none;
  }
  .shine::before{
    content:"";
    position:absolute;
    top:-50%;
    left:-150%;
    width:60%;
    height:200%;
    background:linear-gradient(75deg, transparent 30%, rgba(255,255,255,0.55) 50%, transparent 70%);
    transform:rotate(15deg);
    animation:sweep 3.6s ease-in-out 1.6s infinite;
  }
  @keyframes sweep{
    0%{ left:-150%; }
    35%{ left:150%; }
    100%{ left:150%; }
  }
  .sparkle{
    position:absolute;
    width:8px;height:8px;
    opacity:0;
    animation:sparkleAnim 2.6s ease-in-out infinite;
  }
  .sparkle::before,.sparkle::after{
    content:"";
    position:absolute;
    background:var(--gold);
  }
  .sparkle::before{ width:100%; height:2px; top:50%; left:0; transform:translateY(-50%); }
  .sparkle::after{ width:2px; height:100%; left:50%; top:0; transform:translateX(-50%); }
  @keyframes sparkleAnim{
    0%,100%{ opacity:0; transform:scale(0.3) rotate(0deg); }
    50%{ opacity:1; transform:scale(1.1) rotate(90deg); }
  }
  .caption{
    position:absolute;
    bottom:9%;
    left:0;right:0;
    text-align:center;
    opacity:0;
    animation:textIn 1s ease-out 1.9s forwards;
  }
  @keyframes textIn{
    from{ opacity:0; transform:translateY(18px); letter-spacing:6px; }
    to{ opacity:1; transform:translateY(0); letter-spacing:2px; }
  }
  .caption h1{
    margin:0;
    color:var(--paper);
    font-size:26px;
    font-weight:700;
    text-shadow:0 2px 12px rgba(30,111,217,0.6);
  }
  .caption p{
    margin:6px 0 0;
    color:var(--gold);
    font-size:13px;
    font-style:italic;
    letter-spacing:1px;
  }
</style>
</head>
<body>
<div class="stage" id="stage">
  <div class="stars" id="stars"></div>

  <div class="glow-ring" style="width:600px;height:400px;"></div>
  <div class="glow-ring r2" style="width:400px;height:600px;"></div>
  <div class="aura"></div>
  
  <div class="logo-wrap">
    <img src="logo.png" >
    <div class="shine"></div>
  </div>

  <div class="caption">
    <h1>NAZRUL MESS</h1>
    <p>UNITY IS THE SIGN OF HAPPYNESS</p>
  </div>
</div>

<script>
  // Register the service worker (required by Chrome/Android for the
  // app to be installable, and so the "No Internet Connection" page
  // can be served even when a page-load fails outright while offline).
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').then((reg) => reg.update()).catch(() => {});
  }

  // Check if the page is being REFRESHED by the user
  const navEntries = performance.getEntriesByType('navigation');
  const isRefresh = navEntries.length > 0 && navEntries[0].type === 'reload';

  // A lightweight, same-origin request is a more reliable connectivity
  // check than navigator.onLine alone.
  async function hasRealConnection() {
    if (!navigator.onLine) return false;
    try {
      await fetch('manifest.json', { method: 'GET', cache: 'no-store' });
      return true;
    } catch (err) {
      return false;
    }
  }

  function goToMain() {
    window.location.replace('main.html');
  }

  function goToErrorPage() {
    window.location.replace('error.html?next=main.html');
  }

  async function proceedOrShowError(withFade) {
    if (await hasRealConnection()) {
      if (withFade) {
        document.body.classList.add('leaving');
        setTimeout(goToMain, FADE_OUT_TIME);
      } else {
        goToMain();
      }
    } else {
      goToErrorPage();
    }
  }

  const FADE_OUT_TIME = 600;

  // If refreshed, skip animation and go straight to main app (after
  // confirming there's actually a connection).
  if (isRefresh) {
    proceedOrShowError(false);
  } else {
    const stage = document.getElementById('stage');

    // 1. Create background stars
    const starsEl = document.getElementById('stars');
    for (let i = 0; i < 60; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      s.style.left = Math.random() * 100 + '%';
      s.style.top = Math.random() * 100 + '%';
      s.style.animationDelay = (Math.random() * 3) + 's';
      s.style.animationDuration = (2 + Math.random() * 3) + 's';
      starsEl.appendChild(s);
    }

    // 2. Create sparkles
    const count = 8;
    const radius = 210;
    for (let i = 0; i < count; i++) {
      const angle = (i / count) * Math.PI * 2;
      const x = Math.cos(angle) * radius;
      const y = Math.sin(angle) * radius;
      const sp = document.createElement('div');
      sp.className = 'sparkle';
      sp.style.left = 'calc(50% + ' + x + 'px)';
      sp.style.top = 'calc(50% + ' + y + 'px)';
      sp.style.animationDelay = (i * 0.3) + 's';
      stage.appendChild(sp);
    }

    // 3. Auto-redirect timer
    const REDIRECT_DELAY = 3200;

    setTimeout(() => {
      proceedOrShowError(true);
    }, REDIRECT_DELAY);
  }
  
</script>
</body>
</html>
